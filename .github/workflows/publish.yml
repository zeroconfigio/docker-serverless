name: Publish Docker Image

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1' # At 00:00 on Monday.

env:
  DOCKER_CLI_EXPERIMENTAL: enabled

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: write
      pull-requests: write

    steps:
      - name: Get Last Serverless Tag
        id: tag
        run: |
          last_tag="$(git ls-remote --tags --refs --sort="v:refname" https://github.com/serverless/serverless.git | awk '{print $2}' | sed 's/refs\/tags\/v//' | tail -n1)"
          echo "::set-output name=last_tag::$last_tag"
          echo $last_tag

      - name: Checkout
        uses: actions/checkout@v2
        with:
          ref: 'main'

      - name: Release snapshot
        id: release-snapshot
        uses: actions/create-release@latest
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: v${{ steps.tag.outputs.last_tag }}
          release_name: v${{ steps.tag.outputs.last_tag }}
          draft: false
          prerelease: false

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v3
        with:
          # images: ${{ github.repository }}
          images: |
            ${{ github.repository }}
            ghcr.io/${{ github.repository }}
            public.ecr.aws/${{ github.repository }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.version=${{ steps.tag.outputs.last_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ github.repository }}
          # tags: |
          #   type=raw,value=latest
          #   type=ref,event=tag
          tags: |
            docker.io/${{ github.repository }}:${{ steps.tag.outputs.last_tag }}
            docker.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.last_tag }}
            ghcr.io/${{ github.repository }}:latest
            public.ecr.aws/${{ github.repository }}:${{ steps.tag.outputs.last_tag }}
            public.ecr.aws/${{ github.repository }}:latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      # - name: Login to Public ECR
      #   uses: docker/login-action@v1
      #   with:
      #     registry: public.ecr.aws
      #     username: ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
      #     password: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
      #   env:
      #     AWS_REGION: us-east-1

      - name: Build and Push
        uses: docker/build-push-action@v2
        with:
          push: true
          context: .
          platforms: linux/amd64,linux/arm64/v8,linux/ppc64le,linux/s390x,linux/arm/v7
          build-args: SERVERLESS_VERSION=${{ steps.tag.outputs.last_tag }}
          cache-from: type=gha, scope=${{ github.repository }}
          cache-to: type=gha, scope=${{ github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
